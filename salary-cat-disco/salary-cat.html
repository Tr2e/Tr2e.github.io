<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>拼豆 Disco</title>

<style>
  body{
    margin:0;
    overflow:hidden;
    background:#1a1a2e;
    font-family:PingFang SC;
  }

  #floor{
    position:fixed;
    inset:0;
    z-index:0;
  }

  #bead{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    max-width:80vmin;
  }

  .overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,.85);
    color:#fff;
    z-index:100;
    cursor:pointer;
  }

  .hidden{display:none}
</style>
</head>

<body>

<canvas id="floor"></canvas>
<canvas id="bead"></canvas>

<div class="overlay" id="ov" onclick="start()">
  <div>🪩 点击开始</div>
</div>

<audio id="bgm" src="music.mp3" loop preload="none"></audio>

<script>
/* =========================
   1. FLOOR（稳定版）
========================= */
const floor = document.getElementById('floor');
const fctx = floor.getContext('2d');

const COLORS = ['#ff6eb4','#7b68ee','#00d4ff','#ffb464'];
const TILE = 80;

function resize(){
  floor.width = innerWidth;
  floor.height = innerHeight;
}
resize();
addEventListener('resize', resize);

function drawFloor(t){
  const w = floor.width;
  const h = floor.height;

  fctx.clearRect(0,0,w,h);

  const cols = w / TILE;
  const rows = h / TILE;

  const time = t * 0.001;

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const c = COLORS[(x+y)%COLORS.length];
      const a = 0.04 + Math.sin(time+x*0.3+y*0.3)*0.04;

      fctx.globalAlpha = a;
      fctx.fillStyle = c;
      fctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }

  fctx.globalAlpha = 1;
}

/* =========================
   2. 拼豆引擎（升级稳定版）
========================= */
const canvas = document.getElementById('bead');
const ctx = canvas.getContext('2d');

let frames = [];
let idx = 0;
let started = false;

/* ===== 参数（核心优化点）===== */
let BEAD = 9;       // 自动调节
let GAP = 2;
let SAMPLE = 2;

/* FPS监测 */
let fps = 60;
let lastFpsTime = performance.now();
let frameCount = 0;

/* =========================
   首帧加载（秒开）
========================= */
async function loadFirst(){
  const meta = await fetch('frames/frames.json').then(r=>r.json());

  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      frames[0] = render(img);
      res();
    };
    img.src = meta[0].file;
  });
}

/* =========================
   后台加载（不阻塞）
========================= */
async function loadRest(){
  const meta = await fetch('frames/frames.json').then(r=>r.json());

  for(let i=1;i<meta.length;i++){
    const img = new Image();
    img.onload = ()=>{
      requestIdleCallback(()=>{
        frames[i] = render(img);
      });
    };
    img.src = meta[i].file;

    await new Promise(r=>setTimeout(r,10));
  }
}

/* =========================
   核心渲染（优化版）
========================= */
function render(img){

  // 🔥 降采样（关键优化）
  const scale = Math.min(1, 500 / Math.max(img.width, img.height));

  const w = (img.width * scale)|0;
  const h = (img.height * scale)|0;

  const tmp = document.createElement('canvas');
  tmp.width = w;
  tmp.height = h;

  const tctx = tmp.getContext('2d');
  tctx.drawImage(img,0,0,w,h);

  const data = tctx.getImageData(0,0,w,h).data;

  let minX=w,minY=h,maxX=0,maxY=0;

  for(let y=0;y<h;y+=SAMPLE){
    for(let x=0;x<w;x+=SAMPLE){
      const i=(y*w+x)*4;
      if(data[i+3]>128){
        if(x<minX)minX=x;
        if(x>maxX)maxX=x;
        if(y<minY)minY=y;
        if(y>maxY)maxY=y;
      }
    }
  }

  const cw=maxX-minX+1;
  const ch=maxY-minY+1;

  const out = document.createElement('canvas');
  out.width = cw*(BEAD+GAP);
  out.height = ch*(BEAD+GAP);

  const o = out.getContext('2d');

  const r = BEAD/2;

  for(let y=0;y<ch;y+=SAMPLE){
    for(let x=0;x<cw;x+=SAMPLE){

      const px=minX+x;
      const py=minY+y;

      const i=(py*w+px)*4;

      if(data[i+3]<128) continue;

      const R=data[i],G=data[i+1],B=data[i+2];

      const cx=x*(BEAD+GAP)+r;
      const cy=y*(BEAD+GAP)+r;

      // 🚀 纯色（去掉 gradient）
      o.fillStyle = `rgb(${R},${G},${B})`;

      o.beginPath();
      o.arc(cx,cy,r,0,Math.PI*2);
      o.fill();
    }
  }

  return out;
}

/* =========================
   动画 loop（双层稳定）
========================= */
let last=0,acc=0;

function loop(t){
  requestAnimationFrame(loop);

  drawFloor(t);

  if(!started || !frames.length) return;

  // FPS监控（自动降级）
  frameCount++;
  if(t - lastFpsTime > 1000){
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = t;

    // 🔥 自动降级（关键稳定点）
    if(fps < 30){
      BEAD = 11;
      SAMPLE = 3;
    } else if(fps > 50){
      BEAD = 9;
      SAMPLE = 2;
    }
  }

  if(!last) last=t;
  acc += t-last;
  last=t;

  if(acc > 50){
    acc = 0;

    const f = frames[idx];

    if(f){
      canvas.width = f.width;
      canvas.height = f.height;
      ctx.drawImage(f,0,0);
    }

    idx = (idx+1)%Math.max(1,frames.length);
  }
}

/* =========================
   启动（秒开关键）
========================= */
async function start(){
  if(started) return;
  started = true;

  document.getElementById('ov').classList.add('hidden');

  const bgm = document.getElementById('bgm');
  bgm.play().catch(()=>{});

  // ⚡ 秒开
  await loadFirst();

  requestAnimationFrame(loop);

  // 后台加载
  loadRest();
}

requestAnimationFrame(loop);
</script>

</body>
</html>
