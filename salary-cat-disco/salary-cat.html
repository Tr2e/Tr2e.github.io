<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>月薪喵 拼豆 Disco</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box}

  body{
    background:#1a1a2e;
    min-height:100vh;
    overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  }

  /* canvas 层（替代 DOM tile） */
  #floorCanvas{
    position:fixed;
    inset:0;
    z-index:0;
  }

  .disco-ball{
    position:fixed;
    top:-40px;
    left:50%;
    transform:translateX(-50%);
    width:70px;height:70px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#999);
    z-index:2;
    animation:spin 4s linear infinite;
  }
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}

  .main{
    position:relative;
    z-index:10;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
  }

  canvas#beadCanvas{
    max-width:min(70vmin,500px);
    width:100%;
  }

  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
    color:#fff;
  }

  .overlay.hidden{display:none}

  .btn{
    padding:12px 28px;
    border:1px solid #fff;
    border-radius:30px;
    cursor:pointer;
    margin-top:12px;
  }

  .footer{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#fff;
    z-index:10;
    letter-spacing:6px;
  }
</style>
</head>

<body>

<div class="disco-ball"></div>

<canvas id="floorCanvas"></canvas>

<div class="overlay" id="overlay" onclick="start()">
  <div>🪩 月薪喵 Disco</div>
  <div class="btn">点击开始</div>
</div>

<div class="main">
  <canvas id="beadCanvas"></canvas>
</div>

<div class="footer">我真的特别爱你</div>

<audio id="bgm" src="music.mp3" loop preload="none"></audio>

<script>
/* =========================
   1. Canvas 背景（替代 DOM tile）
========================= */
const floor = document.getElementById('floorCanvas');
const fctx = floor.getContext('2d');

const COLORS = ['#ff6eb4','#7b68ee','#00d4ff','#ffb464','#ff4081','#69f0ae'];
const TILE = 60;

function resize(){
  floor.width = innerWidth;
  floor.height = innerHeight;
}
resize();
addEventListener('resize', resize);

function drawFloor(t){
  const w = floor.width;
  const h = floor.height;

  fctx.clearRect(0,0,w,h);

  const cols = Math.ceil(w/TILE);
  const rows = Math.ceil(h/TILE);

  const time = t * 0.002;

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const c = COLORS[(x+y)%COLORS.length];
      const a = 0.05 + Math.sin(time + x*0.2 + y*0.2)*0.05;

      fctx.globalAlpha = a;
      fctx.fillStyle = c;
      fctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }

  fctx.globalAlpha = 1;
}

/* =========================
   2. 拼豆动画
========================= */
const canvas = document.getElementById('beadCanvas');
const ctx = canvas.getContext('2d');

const BEAD=5, GAP=1, STEP=BEAD+GAP;

let frames = [];
let idx = 0;
let started = false;
let firstReady = false;

/* ---------- 首帧 ---------- */
async function loadFirst(){
  const meta = await fetch('frames/frames.json').then(r=>r.json());

  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      frames[0] = render(img);
      res();
    };
    img.src = meta[0].file;
  });
}

/* ---------- 后台加载 ---------- */
async function loadRest(){
  const meta = await fetch('frames/frames.json').then(r=>r.json());

  for(let i=1;i<meta.length;i++){
    const img = new Image();
    img.onload = ()=>{
      requestIdleCallback(()=>{
        frames[i] = render(img);
      });
    };
    img.src = meta[i].file;

    await new Promise(r=>setTimeout(r,10));
  }
}

/* ---------- bead render ---------- */
function render(img){
  const t = document.createElement('canvas');
  t.width = img.width;
  t.height = img.height;

  const c = t.getContext('2d');
  c.drawImage(img,0,0);

  const data = c.getImageData(0,0,img.width,img.height).data;

  let minX=img.width,minY=img.height,maxX=0,maxY=0;

  for(let y=0;y<img.height;y++){
    for(let x=0;x<img.width;x++){
      if(data[(y*img.width+x)*4+3]>128){
        minX=Math.min(minX,x);
        maxX=Math.max(maxX,x);
        minY=Math.min(minY,y);
        maxY=Math.max(maxY,y);
      }
    }
  }

  const w = maxX-minX+1;
  const h = maxY-minY+1;

  const out = document.createElement('canvas');
  out.width = w*STEP;
  out.height = h*STEP;

  const o = out.getContext('2d');

  const r = BEAD/2;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const px=minX+x, py=minY+y;
      const i=(py*img.width+px)*4;

      if(data[i+3]<128) continue;

      const R=data[i],G=data[i+1],B=data[i+2];

      const cx=x*STEP+GAP+r;
      const cy=y*STEP+GAP+r;

      const g=o.createRadialGradient(cx,cy,r*0.2,cx,cy,r);
      g.addColorStop(0,`rgba(${R+50},${G+50},${B+50},1)`);
      g.addColorStop(1,`rgba(${R},${G},${B},1)`);

      o.beginPath();
      o.arc(cx,cy,r,0,Math.PI*2);
      o.fillStyle=g;
      o.fill();
    }
  }

  return out;
}

/* =========================
   3. 动画 loop
========================= */
let last=0,acc=0;

function loop(t){
  requestAnimationFrame(loop);

  drawFloor(t);

  if(!firstReady) return;

  if(!last) last=t;
  acc += t-last;
  last=t;

  if(acc>40){
    acc=0;

    const f = frames[idx];
    if(f){
      canvas.width = f.width;
      canvas.height = f.height;
      ctx.drawImage(f,0,0);
    }

    idx = (idx+1) % Math.max(1,frames.length);
  }
}

/* =========================
   4. start（秒开关键）
========================= */
async function start(){
  if(started) return;
  started=true;

  document.getElementById('overlay').classList.add('hidden');

  const bgm = document.getElementById('bgm');
  bgm.play().catch(()=>{});

  // ⚡ 秒开关键：只等第一帧
  await loadFirst();
  firstReady = true;

  requestAnimationFrame(loop);

  // 后台加载
  loadRest();
}

/* start loop */
requestAnimationFrame(loop);
</script>

</body>
</html>
