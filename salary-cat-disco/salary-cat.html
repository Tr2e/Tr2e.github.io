<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月薪喵 拼豆 Disco - 我真的特别爱你</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1a1a2e;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    overflow:hidden;user-select:none;-webkit-user-select:none;
  }
  .dance-floor{position:fixed;inset:0;z-index:0;overflow:hidden}
  .tile{position:absolute;animation:tile-flash 0.5s ease-in-out infinite alternate}
  @keyframes tile-flash{0%{opacity:0}100%{opacity:.1}}
  .disco-ball{
    position:fixed;top:-40px;left:50%;transform:translateX(-50%);
    width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#c0c0c0 40%,#808080 70%,#404040);
    box-shadow:0 0 30px rgba(255,255,255,.3),0 0 60px rgba(200,200,255,.2);
    z-index:2;animation:disco-rotate 4s linear infinite;
  }
  @keyframes disco-rotate{from{transform:translateX(-50%) rotate(0deg)}to{transform:translateX(-50%) rotate(360deg)}}
  .beam-cone{position:fixed;top:0;z-index:1;pointer-events:none;width:180px;height:100vh;background:linear-gradient(to bottom,rgba(255,255,255,.25) 0%,rgba(255,110,180,.15) 15%,rgba(123,104,238,.08) 50%,transparent 100%);clip-path:polygon(50% 0,0% 100%,100% 100%);mix-blend-mode:screen;animation:beam-sway 4s ease-in-out infinite}
  .beam-cone:nth-child(2){animation-delay:-1.3s;background:linear-gradient(to bottom,rgba(0,212,255,.2) 0%,rgba(255,110,180,.1) 20%,rgba(123,104,238,.06) 50%,transparent 100%)}
  .beam-cone:nth-child(3){animation-delay:-2.6s;background:linear-gradient(to bottom,rgba(255,180,100,.15) 0%,rgba(255,110,180,.1) 25%,rgba(0,212,255,.05) 50%,transparent 100%)}
  @keyframes beam-sway{0%,100%{left:20%;opacity:.5;transform:rotate(-8deg)}25%{left:50%;opacity:.9;transform:rotate(0deg)}50%{left:65%;opacity:.6;transform:rotate(6deg)}75%{left:35%;opacity:.7;transform:rotate(-3deg)}}
  .footlights{position:fixed;bottom:0;left:0;right:0;height:100px;z-index:8;pointer-events:none;display:flex;justify-content:space-around;align-items:flex-end;padding-bottom:8px}
  .fl{width:24px;height:24px;border-radius:50%;animation:fl-color 1.5s ease-in-out infinite alternate,fl-glow .7s ease-in-out infinite alternate}
  .fl:nth-child(1){animation-delay:0s}.fl:nth-child(2){animation-delay:.15s}.fl:nth-child(3){animation-delay:.3s}.fl:nth-child(4){animation-delay:.45s}.fl:nth-child(5){animation-delay:.6s}.fl:nth-child(6){animation-delay:.75s}.fl:nth-child(7){animation-delay:.9s}.fl:nth-child(8){animation-delay:1.05s}
  @keyframes fl-color{0%{background:#ff6eb4;box-shadow:0 0 25px #ff6eb4,0 0 50px rgba(255,110,180,.5)}25%{background:#7b68ee;box-shadow:0 0 25px #7b68ee,0 0 50px rgba(123,104,238,.5)}50%{background:#00d4ff;box-shadow:0 0 25px #00d4ff,0 0 50px rgba(0,212,255,.5)}75%{background:#ffb464;box-shadow:0 0 25px #ffb464,0 0 50px rgba(255,180,100,.5)}100%{background:#ff4081;box-shadow:0 0 25px #ff4081,0 0 50px rgba(255,64,129,.5)}}
  @keyframes fl-glow{0%{transform:scale(.7)}100%{transform:scale(1.3)}}
  .haze{position:fixed;bottom:0;left:0;right:0;height:35vh;z-index:6;pointer-events:none;background:radial-gradient(ellipse at 50% 100%,rgba(123,104,238,.08) 0%,transparent 60%);animation:haze-pulse 3s ease-in-out infinite}
  @keyframes haze-pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .moving-head{position:fixed;z-index:7;pointer-events:none;width:40px;height:40px;border-radius:50%;animation:mh-circ 5s linear infinite}
  .moving-head::after{content:'';position:absolute;top:50%;left:50%;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.4) 0%,rgba(255,110,180,.2) 30%,transparent 70%);transform:translate(-50%,-50%);mix-blend-mode:screen}
  @keyframes mh-circ{0%{top:8%;left:10%}25%{top:12%;left:88%}50%{top:75%;left:82%}75%{top:68%;left:12%}100%{top:8%;left:10%}}
  .neon-top,.neon-bottom{
    position:fixed;left:0;right:0;height:2px;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,#ff6eb4,#7b68ee,#00d4ff,#ffb464,#ff6eb4);
    background-size:200% 100%;animation:neon-flow 2s linear infinite;
  }
  .neon-top{top:0}.neon-bottom{bottom:0;animation-direction:reverse}
  @keyframes neon-flow{from{background-position:0% 50%}to{background-position:200% 50%}}
  .overlay{
    position:fixed;inset:0;background:rgba(26,26,46,.95);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:100;cursor:pointer;transition:opacity .6s ease,visibility .6s ease;
  }
  .overlay>*{pointer-events:none}
  .overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .overlay .icon{font-size:4rem;animation:float 2.5s ease-in-out infinite;margin-bottom:1.2rem;filter:drop-shadow(0 0 15px rgba(255,110,180,.6))}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .overlay .start-text{
    color:#fff;font-size:1.3rem;letter-spacing:.15em;
    border:2px solid rgba(255,255,255,.4);padding:.7rem 2.5rem;border-radius:50px;
    transition:all .3s;animation:border-glow 2s ease-in-out infinite;
  }
  @keyframes border-glow{
    0%,100%{border-color:rgba(255,110,180,.5);box-shadow:0 0 15px rgba(255,110,180,.2)}
    50%{border-color:rgba(0,212,255,.5);box-shadow:0 0 15px rgba(0,212,255,.2)}
  }
  .overlay:hover .start-text{background:rgba(255,255,255,.08);transform:scale(1.04)}
  .overlay .hint{color:rgba(255,255,255,.3);font-size:.8rem;margin-top:.8rem}
  .main{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%}
  .bead-stage{position:relative;display:flex;align-items:center;justify-content:center}
  canvas#beadCanvas{image-rendering:auto;max-width:min(70vmin,500px);width:100%;height:auto}
  .glow-ring{position:absolute;border-radius:50%;pointer-events:none;z-index:5}
  .glow-ring:nth-child(2){width:90%;height:60%;box-shadow:0 0 50px rgba(255,110,180,.15);animation:ring-pulse 2s ease-in-out infinite,ring-hue 4s linear infinite}
  .glow-ring:nth-child(3){width:110%;height:75%;box-shadow:0 0 70px rgba(123,104,238,.12);animation:ring-pulse 2.5s ease-in-out .5s infinite,ring-hue 4s linear 1s infinite}
  @keyframes ring-pulse{0%,100%{transform:scale(.85);opacity:.4}50%{transform:scale(1.15);opacity:1}}
  @keyframes ring-hue{0%{box-shadow:0 0 40px rgba(255,110,180,.15)}33%{box-shadow:0 0 55px rgba(123,104,238,.18)}66%{box-shadow:0 0 40px rgba(0,212,255,.15)}100%{box-shadow:0 0 40px rgba(255,110,180,.15)}}
  .footer{
    position:relative;z-index:10;color:#fff;font-size:1.1rem;padding:1.2rem;letter-spacing:.4em;font-weight:bold;
    text-shadow:0 0 10px rgba(255,110,180,.7),0 0 20px rgba(123,104,238,.5),0 0 40px rgba(0,212,255,.3);
    animation:text-glow 2s ease-in-out infinite alternate;
  }
  @keyframes text-glow{from{text-shadow:0 0 8px rgba(255,110,180,.6),0 0 18px rgba(123,104,238,.4)}to{text-shadow:0 0 18px rgba(0,212,255,.7),0 0 35px rgba(255,110,180,.5)}}
  .particle{position:fixed;pointer-events:none;z-index:15;animation:particle-fly linear forwards}
  @keyframes particle-fly{0%{opacity:0;transform:translateY(0) scale(0)}30%{opacity:.9;transform:translateY(-40px) scale(1)}100%{opacity:0;transform:translateY(-180px) translateX(var(--drift)) scale(.2)}}
  @media(max-width:480px){
    .overlay .start-text{font-size:1rem;padding:.5rem 1.8rem}
    .footer{font-size:.85rem;letter-spacing:.2em}
    .disco-ball{width:50px;height:50px;top:-30px}
  }
</style>
</head>
<body>

<div class="disco-ball"></div>
<div class="beam-cone"></div><div class="beam-cone"></div><div class="beam-cone"></div>
<div class="moving-head"></div><div class="moving-head" style="animation-delay:-2.5s"></div>
<div class="haze"></div>
<div class="footlights"><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div></div>
<div class="neon-top"></div><div class="neon-bottom"></div>
<div class="dance-floor" id="danceFloor"></div>

<div class="overlay" id="overlay" onclick="startAnimation()" ontouchstart="startAnimation();event.preventDefault()">
  <div class="icon">🪩</div>
  <div class="start-text">🎵 点 击 开 始 🎵</div>
  <div class="hint">月薪喵 · 拼豆 Disco</div>
</div>

<div class="main">
  <div class="bead-stage">
    <div class="glow-ring"></div><div class="glow-ring"></div>
    <canvas id="beadCanvas"></canvas>
  </div>
</div>
<div class="footer">我 真 的 特 别 爱 你</div>
<audio id="bgm" src="music.mp3" loop preload="auto"></audio>

<script>
// ─── Dance floor ───
!function(){
  const f=document.getElementById('danceFloor');
  const cs=['#ff6eb4','#7b68ee','#00d4ff','#ffb464','#ff4081','#69f0ae'];
  const s=100,cols=Math.ceil(window.innerWidth/s)+1,rows=Math.ceil(window.innerHeight/s)+1;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const t=document.createElement('div');t.className='tile';
    t.style.cssText=`left:${c*s}px;top:${r*s}px;width:${s}px;height:${s}px;background:${cs[(r+c)%cs.length]};animation-delay:${(r+c)*.04}s;animation-duration:${.3+Math.random()*.4}s`;
    f.appendChild(t);
  }
}();

// ─── Particles ───
function spawnParticles(){
  const em=['✨','💫','⭐','🌟','💖','🎵','♪','♫','💿','🪩','🎶','💎','🔥','🌈','🟡','🔵','🟣','🔴','🟢'];
  setInterval(()=>{
    const el=document.createElement('span');el.className='particle';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    el.style.left=(10+Math.random()*80)+'%';el.style.bottom=(5+Math.random()*40)+'%';
    el.style.fontSize=(12+Math.random()*18)+'px';
    el.style.animationDuration=(2+Math.random()*3)+'s';
    el.style.setProperty('--drift',(Math.random()*80-40)+'px');
    document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
  },200);
}

// ─── Bead renderer (on-the-fly, no pre-render) ───
const canvas=document.getElementById('beadCanvas');
const ctx=canvas.getContext('2d');
const BEAD_SIZE=5, BEAD_GAP=1, BEAD_STEP=BEAD_SIZE+BEAD_GAP;

let frameImgs=[], frameDelays=[], frameIdx=0, started=false;
let beadFrames=[];
let animId=null, lastTime=0, frameAccum=0;

// Load all frames in parallel, then pre-render beads once
async function loadFrames(){
  const ov=document.getElementById('overlay');
  const pct=ov.querySelector('.start-text');
  ov.querySelector('.icon').textContent='⏳';
  pct.textContent='下载图片 0%';
  ov.style.pointerEvents='none';

  const meta=await fetch('frames/frames.json').then(r=>r.json());
  const tot=meta.length;
  frameImgs=new Array(tot);frameDelays=new Array(tot);
  let done=0;

  // Phase 1: download all images in parallel
  const promises=meta.map((m,i)=>new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      frameImgs[i]=img;frameDelays[i]=m.delay||40;
      done++;pct.textContent='下载图片 '+Math.round(done/tot*100)+'%';
      resolve();
    };
    img.onerror=reject;
    img.src=m.file;
  }));
  await Promise.all(promises);

  // Phase 2: pre-render all frames as bead canvases (CPU-heavy, do once)
  pct.textContent='渲染拼豆 0%';
  for(let i=0;i<tot;i++){
    beadFrames.push(renderFrameToBeadCanvas(frameImgs[i]));
    pct.textContent='渲染拼豆 '+Math.round((i+1)/tot*100)+'%';
    // Yield to keep UI responsive
    if(i%4===0)await new Promise(r=>setTimeout(r,0));
  }

  ov.classList.add('hidden');
}

// Render one frame into a bead canvas (pre-render phase only)
function renderSingleFrameToBead(img){
  const tmp=document.createElement('canvas');
  tmp.width=img.width;tmp.height=img.height;
  const tc=tmp.getContext('2d');
  tc.drawImage(img,0,0);
  const data=tc.getImageData(0,0,img.width,img.height).data;
  const w=img.width,h=img.height;
  let minX=w,minY=h,maxX=0,maxY=0;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(data[(y*w+x)*4+3]>128){if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}
  }
  const cw=maxX-minX+1,ch=maxY-minY+1;
  const outW=cw*BEAD_STEP+BEAD_GAP,outH=ch*BEAD_STEP+BEAD_GAP;
  const oc=document.createElement('canvas');
  oc.width=outW;oc.height=outH;
  const octx=oc.getContext('2d');
  octx.fillStyle='#1a1a2e';octx.fillRect(0,0,outW,outH);
  const br=BEAD_SIZE/2;
  for(let by=0;by<ch;by++)for(let bx=0;bx<cw;bx++){
    const px=minX+bx,py=minY+by;
    const i=(py*w+px)*4;
    if(data[i+3]<128)continue;
    const r=data[i],g=data[i+1],b=data[i+2];
    const cx=bx*BEAD_STEP+BEAD_GAP+br,cy=by*BEAD_STEP+BEAD_GAP+br;
    octx.beginPath();octx.arc(cx+1.5,cy+1.5,br,0,Math.PI*2);
    octx.fillStyle='rgba(0,0,0,.35)';octx.fill();
    const grad=octx.createRadialGradient(cx-br*.3,cy-br*.35,br*.05,cx,cy,br);
    grad.addColorStop(0,`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},1)`);
    grad.addColorStop(.5,`rgba(${r},${g},${b},1)`);
    grad.addColorStop(1,`rgba(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)},1)`);
    octx.beginPath();octx.arc(cx,cy,br-.5,0,Math.PI*2);
    octx.fillStyle=grad;octx.fill();
    octx.beginPath();octx.arc(cx-br*.25,cy-br*.3,br*.22,0,Math.PI*2);
    octx.fillStyle='rgba(255,255,255,.35)';octx.fill();
  }
  return oc;
}
var renderFrameToBeadCanvas = renderSingleFrameToBead;

// On-the-fly version removed - animation uses pre-rendered beadFrames only

function animate(ts){
  if(!started||!beadFrames.length){animId=requestAnimationFrame(animate);return}
  if(!lastTime)lastTime=ts;
  const dt=ts-lastTime;lastTime=ts;frameAccum+=dt;
  const delay=frameDelays[frameIdx]||40;
  if(frameAccum>=delay){
    frameAccum-=delay;
    const fc=beadFrames[frameIdx];
    canvas.width=fc.width;canvas.height=fc.height;
    ctx.drawImage(fc,0,0);
    frameIdx=(frameIdx+1)%beadFrames.length;
  }
  animId=requestAnimationFrame(animate);
}

async function startAnimation(){
  if(started)return;
  // Play audio immediately while user gesture is active
  const bgm=document.getElementById('bgm');
  bgm.volume=.7;
  bgm.play().catch(()=>{});
  // Then load frames (overlay shows progress)
  if(!frameImgs.length)await loadFrames();
  document.getElementById('overlay').classList.add('hidden');
  started=true;lastTime=0;frameAccum=0;frameIdx=0;
  animId=requestAnimationFrame(animate);
  spawnParticles();
}
</script>
</body>
</html>
